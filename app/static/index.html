<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NkCloud</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="header-logo" onclick="window.location.hash='/'">Nk<span>Cloud</span></div>
        <div class="search-box">
            <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" id="searchInput" data-i18n-placeholder="header.search">
            <div class="search-results" id="searchResults"></div>
        </div>
        <div class="header-actions">
            <button class="btn btn-primary" id="uploadBtn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                <span data-i18n="header.upload"></span>
            </button>
            <div class="header-secondary" id="headerSecondary">
                <button class="btn btn-ghost" id="newFolderBtn" onclick="window._newFolder()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    <span data-i18n="header.new_folder"></span>
                </button>
                <button class="btn-icon" onclick="window._openShares()" data-i18n-title="header.shares">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
                    <span class="overflow-label" data-i18n="header.shares"></span>
                </button>
                <button class="btn-icon" onclick="window._openTrash()" data-i18n-title="header.trash">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
                    <span class="overflow-label" data-i18n="header.trash"></span>
                </button>
                <button class="btn-icon" id="adminBtn" onclick="window._openAdmin()" data-i18n-title="header.admin" style="display:none">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6z"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                    <span class="overflow-label" data-i18n="header.admin"></span>
                </button>
                <button class="btn-icon" onclick="window._openUploadSettings()" data-i18n-title="header.settings">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/><line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/><line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/><line x1="1" y1="14" x2="7" y2="14"/><line x1="9" y1="8" x2="15" y2="8"/><line x1="17" y1="16" x2="23" y2="16"/></svg>
                    <span class="overflow-label" data-i18n="header.settings"></span>
                </button>
                <button class="btn-icon" onclick="window._openHelp()" data-i18n-title="header.help">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                    <span class="overflow-label" data-i18n="header.help"></span>
                </button>
                <span class="user-badge" id="userBadge"></span>
                <span id="langSelector"></span>
                <button class="btn-icon" onclick="window.API.logout()" data-i18n-title="header.logout">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                    <span class="overflow-label" data-i18n="header.logout"></span>
                </button>
            </div>
            <button class="btn-icon header-overflow-toggle" id="headerOverflowToggle" onclick="window._toggleHeaderMenu(event)" aria-label="Menu">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/></svg>
            </button>
        </div>
    </div>

    <!-- Breadcrumbs -->
    <div class="breadcrumbs" id="breadcrumbs">
        <a href="#/" data-i18n="breadcrumb.home"></a>
    </div>

    <!-- Selection toolbar -->
    <div class="toolbar" id="toolbar">
        <span class="count" data-i18n="toolbar.selected"></span>
        <button class="btn btn-ghost" onclick="window._selectAll()" data-i18n="toolbar.select_all"></button>
        <button class="btn btn-ghost" onclick="window._toolbarDownload()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            <span data-i18n="toolbar.download"></span>
        </button>
        <button class="btn btn-ghost" onclick="window._toolbarMove()" data-i18n="toolbar.move"></button>
        <button class="btn btn-danger" onclick="window._toolbarDelete()" data-i18n="toolbar.delete"></button>
    </div>

    <!-- View bar -->
    <div class="view-bar">
        <div class="left">
            <span class="disk-info" id="diskInfo"></span>
        </div>
        <div class="right">
            <select class="sort-select" onchange="window._setSort(this.value)">
                <option value="name" data-i18n="view.sort_name"></option>
                <option value="size" data-i18n="view.sort_size"></option>
                <option value="modified" data-i18n="view.sort_modified"></option>
            </select>
            <button class="btn-icon" id="listViewBtn" onclick="window._setView('list')" data-i18n-title="view.list_view">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
            </button>
            <button class="btn-icon" id="gridViewBtn" onclick="window._setView('grid')" data-i18n-title="view.grid_view">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
            </button>
        </div>
    </div>

    <!-- File container -->
    <div id="fileContainer">
        <div class="empty-state">
            <div class="empty-icon">&#9697;</div>
            <div class="empty-text" data-i18n="common.loading"></div>
        </div>
    </div>

    <!-- Drop overlay -->
    <div class="drop-overlay" id="dropOverlay">
        <div class="drop-icon">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        </div>
        <div class="drop-text" data-i18n="files.drop_title"></div>
        <div class="drop-sub" data-i18n="files.drop_subtitle"></div>
    </div>

    <!-- Upload panel -->
    <div class="upload-panel" id="uploadPanel">
        <div class="upload-panel-header">
            <span data-i18n="files.uploading"></span>
            <button class="btn-icon" onclick="document.getElementById('uploadPanel').classList.remove('visible');document.getElementById('uploadList').innerHTML=''">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>
        <div class="upload-list" id="uploadList"></div>
    </div>

    <!-- Media viewer overlay -->
    <div class="viewer-overlay" id="viewerOverlay" onclick="if(event.target===this)window._closeViewer()">
        <button class="btn-icon viewer-close" onclick="window._closeViewer()" style="color:#fff">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
        <button class="viewer-nav prev" onclick="window._viewerPrev()">&#8249;</button>
        <div id="viewerContent"></div>
        <button class="viewer-nav next" onclick="window._viewerNext()">&#8250;</button>
        <div class="viewer-filename" id="viewerFilename"></div>
    </div>

    <!-- Modal overlay -->
    <div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)window._closeModal()">
        <div class="modal" id="modalContent"></div>
    </div>

    <!-- Context menu -->
    <div class="context-menu" id="contextMenu"></div>

    <!-- Toast container -->
    <div class="toast-container" id="toasts"></div>

    <script type="module">
        import { initI18n } from '/static/js/i18n.js';
        await initI18n();
        // app.js and api.js load after i18n is ready
        await import('/static/js/app.js');
        const { default: API } = await import('/static/js/api.js');
        window.API = API;
    </script>
</body>
</html>
